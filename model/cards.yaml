# YOLOv8 dataset config — TEMPLATE for hand-labeling your own frames.
#
# If you downloaded a dataset from Roboflow (model/download_dataset.py), use the
# data.yaml that ships inside ./dataset/ instead — its class order matches the
# downloaded labels. This file is for the case where you label your own captured
# frames using this project's "<rank>_<suit>" naming convention.
#
# `path` is relative to where you run `yolo`/train.py (the project root).
# Class indices below MUST match the integers in your .txt label files
# (0 = A_clubs, 1 = 2_clubs, ... 51 = K_spades).

path: ./dataset
train: labeled/images        # or train/images for a split dataset
val: labeled/images          # point at a real validation split for honest metrics
# test: test/images

names:
  0:  A_clubs
  1:  2_clubs
  2:  3_clubs
  3:  4_clubs
